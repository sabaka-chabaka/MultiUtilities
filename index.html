<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiUtilities - everyday utilities</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Multi<span>Utilities</span> – A hub for everyday utilities</h1>
        </div>
    </header>

    <section class="main">
        <div class="tool">
            <a href="https://sabaka-chabaka.github.io/MetricConverter/">
                <i class="fa-solid fa-gauge"></i>
                <h2>Metric Converter</h2>
            </a>

        </div>
        <div class="tool">
            <a href="https://sabaka-chabaka.github.io/TemperatureConverter/">
                <i class="fa-solid fa-temperature-full"></i>
                <h2>Temperature Converter</h2>
            </a>
        </div>
        <div class="tool">
            <a href="https://sabaka-chabaka.github.io/TextAnalyzer/">
                <i class="fa-solid fa-align-justify"></i>
                <h2>Text Analyzer</h2>
            </a>
        </div>
        <div class="tool">
            <a href="https://sabaka-chabaka.github.io/RGBHEX/">
                <i class="fa-solid fa-palette"></i>
                <h2>RGB to HEX</h2>
            </a>
        </div>
        <div class="tool">
            <a href="https://sabaka-chabaka.github.io/TipsCalc/">
                <i class="fa-solid fa-palette"></i>
                <h2>Tips Calculator</h2>
            </a>
        </div>
        <div class="tool">
            <a href="https://sabaka-chabaka.github.io/TextToSpeech/">
                <i class="fa-solid fa-palette"></i>
                <h2>Text To Speech</h2>
            </a>
        </div>
    </section>
</body>
</html>
